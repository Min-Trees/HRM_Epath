spring:
  application:
    name: hrm-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hrm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: hr
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always

attendance:
  nguong-di-tre-phut: 5
  nguong-ve-som-phut: 5
  giam-cua-gps-cho-phep: false

logging:
  level:
    root: INFO
    com.company.hrm: DEBUG

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/hrm
    username: postgres
    password: postgres